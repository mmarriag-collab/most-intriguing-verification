name: Python symbolic tests

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      degree:
        description: "Degree n for Q_n"
        required: true
        default: "4"
      method:
        description: "Construction method: operational, rodrigues, or hyper"
        required: true
        default: "operational"
      format:
        description: "Output format: latex or plain"
        required: true
        default: "latex"

jobs:
  test-and-generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run symbolic tests
        run: |
          python -m pytest -q

      - name: Generate polynomial vector
        run: |
          if [ "${{ github.event.inputs.format || 'latex' }}" = "latex" ]; then
            extension="tex"
          else
            extension="txt"
          fi
          python show_polynomials.py \
            --degree "${{ github.event.inputs.degree || '4' }}" \
            --method "${{ github.event.inputs.method || 'operational' }}" \
            --format "${{ github.event.inputs.format || 'latex' }}" \
            --output "Q_${{ github.event.inputs.degree || '4' }}.${extension}"

      - name: Upload generated polynomial vector
        uses: actions/upload-artifact@v4
        with:
          name: generated-polynomials
          path: Q_*
