name: Python symbolic tests

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      degree:
        description: "Degree n for Q_n"
        required: false
        default: "3"
      format:
        description: "Output format: latex, latex_blocks, markdown, or plain"
        required: false
        default: "latex_blocks"

jobs:
  test-and-generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run symbolic tests
        run: |
          python -m pytest -q

      - name: Generate three-constructions output
        run: |
          python show_three_constructions.py \
            --degree "${{ github.event.inputs.degree || '3' }}" \
            --format "${{ github.event.inputs.format || 'latex_blocks' }}" \
            --output "Q_three_constructions_output.txt"

      - name: Upload three-constructions output
        uses: actions/upload-artifact@v4
        with:
          name: three-constructions-degree-${{ github.event.inputs.degree || '3' }}
          path: Q_three_constructions_output.txt
